<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vamos contar</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <h1>Vamos contar</h1>
    </header>
    <section>
        <div id="opções">
            <p>Início:
                <input type="number" id="ini" name="ini" min="0">
            </p>
            <p>Fim:
                <input type="number" id="fim" name="fim" min="0">
            </p>
            <p>Passo:
                <input type="number" id="pas" name="pas" min="0">
            </p>
        </div>

        <div id="botão">
            <p>
                <button id="cont" onclick="contar()">Contar</button>
            </p>
        </div>

        <div id="res">
            Preparando a contagem...
        </div>
    </section>
    <footer>
        <p>&copy; PaulinDezainis</p>
    </footer>
    <script src="./script.js"></script>
</body>
</html>
